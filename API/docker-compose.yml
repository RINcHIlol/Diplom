version: "3.9"

services:
  db:
    image: postgres:18
    container_name: diplom-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diplomdb
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - diplom-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build: .
    container_name: diplom-api
    restart: always
    ports:
      - "5132:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=diplomdb;Username=postgres;Password=postgres"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - diplom-net

networks:
  diplom-net:
    driver: bridge

volumes:
  pgdata: